<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-login" class="page" style="background:var(--bg)">
    <div class="login-bg">
        <div class="login-blob" style="width:300px;height:300px;background:var(--accent);top:-80px;left:-60px;animation-delay:0s;"></div>
        <div class="login-blob" style="width:250px;height:250px;background:var(--warm);bottom:100px;right:-80px;animation-delay:2s;"></div>
        <div class="login-blob" style="width:200px;height:200px;background:#8B5CF6;bottom:-40px;left:30%;animation-delay:4s;"></div>
    </div>

    <div style="position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;padding:24px;">
        <!-- Logo区域 -->
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-top:60px;">
            <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px var(--accent-glow);margin-bottom:20px;">
                <i class="fas fa-water" style="font-size:36px;color:#fff;"></i>
            </div>
            <h1 style="font-family:'ZCOOL KuaiLe',sans-serif;font-size:32px;color:var(--fg);margin-bottom:4px;">题海拾贝</h1>
            <p style="color:var(--muted);font-size:14px;">每天进步一点点，知识海洋任你游</p>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" style="padding-bottom:40px;">
            <div style="margin-bottom:16px;">
                <div style="position:relative;">
                    <i class="fas fa-mobile-alt" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="tel" id="loginPhone" class="g-input" style="padding-left:44px;" placeholder="请输入手机号" maxlength="11">
                </div>
            </div>
            <div style="margin-bottom:24px;">
                <div style="position:relative;">
                    <i class="fas fa-lock" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="password" id="loginPwd" class="g-input" style="padding-left:44px;" placeholder="请输入密码">
                    <button onclick="togglePwdVis('loginPwd',this)" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <button class="g-btn g-btn-primary" style="width:100%;padding:16px;" onclick="handleLogin()">
                登录
            </button>
            <div style="text-align:center;margin-top:16px;">
                <span style="color:var(--muted);font-size:13px;">还没有账号？</span>
                <button onclick="showRegister()" style="background:none;border:none;color:var(--accent2);font-size:13px;font-weight:600;cursor:pointer;">立即注册</button>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" style="display:none;padding-bottom:40px;">
            <div style="margin-bottom:16px;">
                <div style="position:relative;">
                    <i class="fas fa-user" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="text" id="regName" class="g-input" style="padding-left:44px;" placeholder="请输入昵称" maxlength="12">
                </div>
            </div>
            <div style="margin-bottom:16px;">
                <div style="position:relative;">
                    <i class="fas fa-mobile-alt" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="tel" id="regPhone" class="g-input" style="padding-left:44px;" placeholder="请输入手机号" maxlength="11">
                </div>
            </div>
            <div style="margin-bottom:16px;">
                <div style="position:relative;">
                    <i class="fas fa-lock" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="password" id="regPwd" class="g-input" style="padding-left:44px;" placeholder="请设置密码（6-20位）">
                    <button onclick="togglePwdVis('regPwd',this)" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <div style="margin-bottom:24px;">
                <div style="position:relative;">
                    <i class="fas fa-shield-alt" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;"></i>
                    <input type="password" id="regPwd2" class="g-input" style="padding-left:44px;" placeholder="请确认密码">
                </div>
            </div>
            <button class="g-btn g-btn-primary" style="width:100%;padding:16px;" onclick="handleRegister()">
                注册
            </button>
            <div style="text-align:center;margin-top:16px;">
                <span style="color:var(--muted);font-size:13px;">已有账号？</span>
                <button onclick="showLogin()" style="background:none;border:none;color:var(--accent2);font-size:13px;font-weight:600;cursor:pointer;">去登录</button>
            </div>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
