<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-profile" class="page">
    <div style="padding-bottom:80px;">
        <!-- 个人信息卡片 -->
        <div style="padding:24px 20px;background:linear-gradient(180deg,rgba(13,148,136,0.15),transparent);">
            <div style="display:flex;align-items:center;gap:16px;">
                <div id="profileAvatar" style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:24px;box-shadow:0 4px 20px var(--accent-glow);">U</div>
                <div style="flex:1;">
                    <div style="font-size:20px;font-weight:700;" id="profileName">用户</div>
                    <div style="color:var(--muted);font-size:13px;margin-top:2px;" id="profilePhone">138****8888</div>
                    <div style="display:flex;gap:8px;margin-top:6px;">
                        <span class="g-tag" style="background:linear-gradient(135deg,rgba(251,146,60,0.2),rgba(251,146,60,0.1));color:var(--warm);">
                            <i class="fas fa-fire"></i> Lv.<span id="profileLevel">1</span>
                        </span>
                        <span class="g-tag" style="background:rgba(13,148,136,0.12);color:var(--accent2);">
                            <i class="fas fa-star"></i> <span id="profileExp">0</span> 经验
                        </span>
                    </div>
                </div>
                <button onclick="showEditProfile()" style="width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-pen" style="font-size:13px;"></i>
                </button>
            </div>

            <!-- 经验条 -->
            <div style="margin-top:16px;">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;">
                    <span>升级进度</span>
                    <span id="expProgress">0/100</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="expBar" style="width:0%;"></div>
                </div>
            </div>
        </div>

        <!-- 学习数据 -->
        <div style="padding:0 20px;">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
                <div style="text-align:center;padding:12px 0;">
                    <div style="font-size:20px;font-weight:900;color:var(--accent2);" id="pStatTotal">0</div>
                    <div style="font-size:11px;color:var(--muted);">总题数</div>
                </div>
                <div style="text-align:center;padding:12px 0;">
                    <div style="font-size:20px;font-weight:900;color:var(--success);" id="pStatCorrect">0</div>
                    <div style="font-size:11px;color:var(--muted);">答对</div>
                </div>
                <div style="text-align:center;padding:12px 0;">
                    <div style="font-size:20px;font-weight:900;color:var(--warm);" id="pStatDays">0</div>
                    <div style="font-size:11px;color:var(--muted);">学习天数</div>
                </div>
                <div style="text-align:center;padding:12px 0;">
                    <div style="font-size:20px;font-weight:900;color:var(--info);" id="pStatAvgAcc">0%</div>
                    <div style="font-size:11px;color:var(--muted);">正确率</div>
                </div>
            </div>
        </div>

        <!-- 功能列表 -->
        <div style="padding:8px 20px;">
            <div class="g-card" style="padding:0;overflow:hidden;">
                <div onclick="navigateTo('wrong.html')" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(239,68,68,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-times-circle" style="color:var(--danger);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">错题本</span>
                    <span style="color:var(--muted);font-size:13px;" id="wrongCount">0题</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
                <div onclick="navigateTo('favorites.html')" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(251,146,60,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-bookmark" style="color:var(--warm);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">我的收藏</span>
                    <span style="color:var(--muted);font-size:13px;" id="favCount">0题</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
                <div onclick="navigateTo('stats.html')" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-chart-bar" style="color:var(--info);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">学习报告</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
                <div onclick="navigateTo('history.html')" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(13,148,136,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-history" style="color:var(--accent2);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">答题历史</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
                <div onclick="navigateTo('achievements.html')" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(168,85,247,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-trophy" style="color:#C084FC;"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">成就徽章</span>
                    <span style="color:var(--muted);font-size:13px;" id="achieveCount">0/12</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
            </div>
        </div>

        <!-- 设置区域 -->
        <div style="padding:8px 20px;">
            <div class="g-card" style="padding:0;overflow:hidden;">
                <div onclick="toggleDarkMode()" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-moon" style="color:#818CF8;"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">深色模式</span>
                    <div id="darkToggle" style="width:44px;height:24px;border-radius:12px;background:var(--accent);position:relative;cursor:pointer;transition:background 0.3s;">
                        <div style="width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:2px;left:22px;transition:left 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.2);"></div>
                    </div>
                </div>
                <div onclick="showAbout()" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-info-circle" style="color:var(--success);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;">关于我们</span>
                    <i class="fas fa-chevron-right" style="color:var(--muted);font-size:12px;"></i>
                </div>
                <div onclick="handleLogout()" style="display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(239,68,68,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-sign-out-alt" style="color:var(--danger);"></i>
                    </div>
                    <span style="flex:1;font-size:15px;color:var(--danger);">退出登录</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/profile.js"></script>
<script>
    window.onload = function() {
        checkLoginAuth();
        if (appState.user) {
            renderProfile();
            renderBottomNav(3);
        }
    };
</script>
</body>
</html>
