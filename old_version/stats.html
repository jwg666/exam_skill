<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 学习报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-stats" class="page">
    <div style="padding-bottom:40px;">
        <div class="page-header" style="padding:16px 20px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <button onclick="goBack()" style="width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 style="font-size:18px;font-weight:700;">学习报告</h1>
            </div>
        </div>

        <div style="padding:20px;">
            <!-- 本周概览 -->
            <div class="g-card" style="margin-bottom:16px;">
                <h3 style="font-weight:700;margin-bottom:16px;">本周练习</h3>
                <div style="display:flex;align-items:flex-end;justify-content:space-around;height:140px;padding:0 8px;" id="weekChart"></div>
                <div style="display:flex;justify-content:space-around;margin-top:8px;" id="weekLabels"></div>
            </div>

            <!-- 科目正确率 -->
            <div class="g-card" style="margin-bottom:16px;">
                <h3 style="font-weight:700;margin-bottom:16px;">各科目正确率</h3>
                <div id="subjectAccList"></div>
            </div>

            <!-- 答题分布 -->
            <div class="g-card">
                <h3 style="font-weight:700;margin-bottom:16px;">答题时段分布</h3>
                <div style="display:flex;align-items:center;gap:16px;">
                    <div style="flex:1;">
                        <div id="timeDistribution" style="display:flex;align-items:flex-end;gap:4px;height:80px;"></div>
                    </div>
                    <div style="font-size:12px;color:var(--muted);line-height:1.8;">
                        <div><i class="fas fa-sun" style="color:var(--warm);"></i> 上午 <span id="morningPct">35%</span></div>
                        <div><i class="fas fa-cloud-sun" style="color:var(--info);"></i> 下午 <span id="afternoonPct">30%</span></div>
                        <div><i class="fas fa-moon" style="color:#818CF8;"></i> 晚间 <span id="eveningPct">35%</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/profile.js"></script>
<script>
    window.onload = function() {
        checkLoginAuth();
        if (appState.user) {
            renderStats();
        }
    };
</script>
</body>
</html>
