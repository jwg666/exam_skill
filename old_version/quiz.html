<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 答题</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-quiz" class="page">
    <div style="min-height:100vh;display:flex;flex-direction:column;">
        <!-- 顶部答题信息栏 -->
        <div class="page-header" style="padding:12px 20px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                <button onclick="confirmQuitQuiz()" style="background:none;border:none;color:var(--fg2);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:4px;">
                    <i class="fas fa-times"></i> 退出
                </button>
                <div style="font-weight:700;font-size:15px;" id="quizProgress">1/10</div>
                <button onclick="toggleAnswerGrid()" style="background:none;border:none;color:var(--fg2);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:4px;">
                    <i class="fas fa-th"></i> 答题卡
                </button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="quizProgressBar" style="width:10%;"></div>
            </div>
        </div>

        <!-- 题目区域 -->
        <div style="flex:1;overflow-y:auto;padding:20px;" id="quizBody">
            <!-- 题目标签 -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
                <span class="g-tag" id="quizDiffTag">中等</span>
                <span class="g-tag" style="background:rgba(13,148,136,0.12);color:var(--accent2);" id="quizTypeTag">单选题</span>
                <div style="flex:1;"></div>
                <button onclick="toggleFlag()" id="flagBtn" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">
                    <i class="far fa-flag"></i>
                </button>
                <button onclick="toggleFavoriteQ()" id="favQBtn" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">
                    <i class="far fa-bookmark"></i>
                </button>
            </div>

            <!-- 题目文本 -->
            <div style="font-size:17px;line-height:1.7;font-weight:500;margin-bottom:24px;" id="quizQuestion">
                题目加载中...
            </div>

            <!-- 选项 -->
            <div style="display:flex;flex-direction:column;gap:12px;" id="quizOptions"></div>

            <!-- 解析区域 -->
            <div id="quizExplanation" style="display:none;margin-top:24px;">
                <div class="g-card" style="border-color:var(--accent);background:rgba(13,148,136,0.05);">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                        <i class="fas fa-lightbulb" style="color:var(--warm);"></i>
                        <span style="font-weight:700;font-size:14px;">解析</span>
                    </div>
                    <p style="font-size:14px;line-height:1.7;color:var(--fg2);" id="quizExpText"></p>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div style="padding:12px 20px 24px;background:var(--bg);border-top:1px solid var(--border);">
            <div style="display:flex;gap:12px;">
                <button onclick="prevQuestion()" class="g-btn g-btn-ghost" style="flex:1;" id="prevBtn">
                    <i class="fas fa-chevron-left"></i> 上一题
                </button>
                <button onclick="nextQuestion()" class="g-btn g-btn-primary" style="flex:2;" id="nextBtn">
                    下一题 <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 答题卡浮层 -->
    <div id="answerGridPanel" style="display:none;position:fixed;inset:0;z-index:150;">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);" onclick="toggleAnswerGrid()"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:24px;max-height:60vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                <h3 style="font-weight:700;font-size:16px;">答题卡</h3>
                <button onclick="toggleAnswerGrid()" style="background:none;border:none;color:var(--muted);cursor:pointer;">
                    <i class="fas fa-times" style="font-size:20px;"></i>
                </button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;" id="answerGridItems"></div>
            <div style="display:flex;gap:16px;margin-top:20px;justify-content:center;">
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
                    <div style="width:12px;height:12px;border-radius:4px;background:var(--accent);"></div> 已答
                </div>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
                    <div style="width:12px;height:12px;border-radius:4px;border:1px solid var(--warm);background:rgba(251,146,60,0.15);"></div> 标记
                </div>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
                    <div style="width:12px;height:12px;border-radius:4px;background:var(--card);border:1px solid var(--border);"></div> 未答
                </div>
            </div>
            <button onclick="submitQuiz()" class="g-btn g-btn-warm" style="width:100%;margin-top:20px;">
                <i class="fas fa-paper-plane"></i> 提交答卷
            </button>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/quiz.js"></script>
<script>
    window.onload = function() {
        checkLoginAuth();
        if (appState.user) {
            initQuiz();
        }
    };
</script>
</body>
</html>
