<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 错题本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-wrong" class="page">
    <div style="padding-bottom:80px;">
        <div class="page-header" style="padding:16px 20px;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <h1 style="font-size:22px;font-weight:900;">错题本</h1>
                <button onclick="clearWrongBook()" style="background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;">
                    <i class="fas fa-trash-alt"></i> 清空
                </button>
            </div>
        </div>

        <!-- 筛选 -->
        <div class="scroll-x" style="padding:12px 20px;">
            <div style="display:flex;gap:8px;">
                <button class="g-tag wrong-filter active" data-filter="all" onclick="filterWrong('all',this)" style="background:var(--accent);color:#fff;cursor:pointer;border:none;padding:6px 14px;">全部</button>
                <button class="g-tag wrong-filter" data-filter="exam" onclick="filterWrong('exam',this)" style="background:var(--card);color:var(--fg2);cursor:pointer;border:none;padding:6px 14px;">考试类</button>
                <button class="g-tag wrong-filter" data-filter="skill" onclick="filterWrong('skill',this)" style="background:var(--card);color:var(--fg2);cursor:pointer;border:none;padding:6px 14px;">技能类</button>
                <button class="g-tag wrong-filter" data-filter="license" onclick="filterWrong('license',this)" style="background:var(--card);color:var(--fg2);cursor:pointer;border:none;padding:6px 14px;">资格类</button>
            </div>
        </div>

        <div style="padding:0 20px;" id="wrongList"></div>

        <div id="wrongEmpty" style="display:none;text-align:center;padding:80px 20px;">
            <i class="fas fa-check-double" style="font-size:48px;color:var(--accent);opacity:0.3;"></i>
            <p style="color:var(--muted);margin-top:16px;">暂无错题，继续保持！</p>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/wrong.js"></script>
<script>
    window.onload = function() {
        checkLoginAuth();
        if (appState.user) {
            renderWrongBook();
            renderBottomNav(2);
        }
    };
</script>
</body>
</html>
