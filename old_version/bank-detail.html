<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>题海拾贝 - 题库详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div id="page-bankDetail" class="page">
    <div style="padding-bottom:80px;">
        <div class="page-header" style="padding:16px 20px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <button onclick="goBack()" style="width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 style="font-size:18px;font-weight:700;" id="bankDetailTitle">题库详情</h1>
            </div>
        </div>

        <div style="padding:20px;" id="bankDetailContent"></div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/bank.js?v=2"></script>
<script>
    window.onload = function() {
        checkLoginAuth();
        if (appState.user) {
            const urlParams = new URLSearchParams(window.location.search);
            const bankId = urlParams.get('id');
            if (bankId) {
                openBankDetail(bankId);
            } else {
                window.location.href = 'bank.html';
            }
        }
    };
</script>
</body>
</html>
